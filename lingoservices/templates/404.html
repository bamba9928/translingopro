<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | TranslingoPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --marine-deep: #050D1F;
            --marine-dark: #0A1930;
            --marine-light: #1E3A6E;
            --accent-gold: #C9A84C;
            --pure-white: #FFFFFF;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--marine-deep);
            color: var(--pure-white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 50% 50%, rgba(30,58,110,0.4) 0%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 80% 20%, rgba(201,168,76,0.06) 0%, transparent 50%);
        }

        body::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .container {
            position: relative;
            z-index: 1;
            padding: 2rem;
            max-width: 520px;
        }

        .error-code {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(6rem, 15vw, 10rem);
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, var(--accent-gold) 0%, #F0D080 50%, var(--accent-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            letter-spacing: -4px;
        }

        h2 {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.4rem;
            margin-bottom: 1rem;
            color: var(--pure-white);
        }

        p {
            font-size: 1rem;
            color: rgba(255,255,255,0.55);
            line-height: 1.7;
            margin-bottom: 2rem;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(135deg, var(--accent-gold), #E8C560);
            color: var(--marine-deep);
            padding: 0.85rem 2.2rem;
            border-radius: 999px;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            text-decoration: none;
            box-shadow: 0 8px 32px rgba(201,168,76,0.25);
            transition: all 0.35s cubic-bezier(0.16,1,0.3,1);
        }

        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 40px rgba(201,168,76,0.4);
            color: var(--marine-deep);
        }

        .brand {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.3);
            margin-top: 3rem;
            letter-spacing: -0.3px;
        }

        .brand-dot {
            display: inline-block;
            width: 5px;
            height: 5px;
            background: var(--accent-gold);
            border-radius: 50%;
            margin-bottom: -1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <h2>Page Not Found</h2>
        <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
        <a href="/" class="btn-home">Back to Home</a>
        <div class="brand">TranslingoPro<span class="brand-dot"></span></div>
    </div>
</body>
</html>
